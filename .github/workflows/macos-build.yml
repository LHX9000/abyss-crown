name: macOS Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: brew install cmake ninja sdl2 sdl2_ttf

      - name: Configure
        run: cmake -S . -B build-ci -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_PREFIX_PATH="$(brew --prefix sdl2);$(brew --prefix sdl2_ttf)"

      - name: Build
        run: cmake --build build-ci
